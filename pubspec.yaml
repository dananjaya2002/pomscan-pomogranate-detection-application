name: Pomescan
description: "AI-powered plant disease detection app using Flutter and TensorFlow Lite."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera
  camera: ^0.10.5+9
  permission_handler: ^11.3.1

  # ML / TFLite
  tflite_flutter: ^0.12.1
  image: ^4.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Utilities
  equatable: ^2.0.5
  logger: ^2.4.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/content/

